<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Musketeers — Website UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
</style>
</head>
<body>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Services.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>

<script type="text/babel">
// ── Pages ─────────────────────────────────────────────────
const AboutPage = () => (
  <div style={{ background: '#fff', minHeight: '60vh', padding: '80px 64px' }}>
    <div style={{ maxWidth: 1200, margin: '0 auto', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 80, alignItems: 'center' }}>
      <div>
        <div style={{ fontFamily: "'Inter',sans-serif", fontSize: 11, fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase', color: '#A8A8A8', marginBottom: 16 }}>Our Story</div>
        <h1 style={{ fontFamily: "'Inter Display','Inter',sans-serif", fontSize: 'clamp(36px,5vw,64px)', fontWeight: 900, lineHeight: 1.0, letterSpacing: '-0.04em', color: '#000', marginBottom: 24 }}>
          Not from<br />ambition.<br />From necessity.
        </h1>
        <p style={{ fontFamily: "'Inter',sans-serif", fontSize: 16, lineHeight: 1.7, color: '#707070', marginBottom: 16 }}>
          Musketeers started from scratch — no big idea, no business plan, just survival mode. From that chaos came real work, real clients, and eventually a world-class team.
        </p>
        <p style={{ fontFamily: "'Inter',sans-serif", fontSize: 16, lineHeight: 1.7, color: '#707070' }}>
          Today we serve enterprise-level clients and have co-launched multiple SaaS products through our Genesys ecosystem. One designer became a full branding team.
        </p>
      </div>
      <div style={{ background: '#000', height: 400, display: 'flex', alignItems: 'center', justifyContent: 'center', position: 'relative', overflow: 'hidden' }}>
        <img src="../../assets/logomark-light.svg" alt="" style={{ width: 160, opacity: 0.15 }} />
        <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, height: 4, background: 'linear-gradient(to right,#FFD81D 0%,#FC2511 33%,#6A00D0 49%,#2431F3 58%,#0D41FF 67%,#009A88 82%,#30E047 100%)' }}></div>
        <div style={{ position: 'absolute', textAlign: 'center' }}>
          <div style={{ fontFamily: "'Inter Display','Inter',sans-serif", fontSize: 96, fontWeight: 900, color: '#fff', lineHeight: 1 }}>3</div>
          <div style={{ fontFamily: "'Inter',sans-serif", fontSize: 11, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', color: '#484848' }}>Brand Pillars</div>
        </div>
      </div>
    </div>
    {/* Pillars */}
    <div style={{ maxWidth: 1200, margin: '64px auto 0', display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 1, background: '#E8E8E8' }}>
      {[
        { word: 'Persistent', traits: 'Confident · Innovative · Friendly', color: '#FC2E12' },
        { word: 'Vital', traits: 'Goto · Amazing · Comforting', color: '#0D41FF' },
        { word: 'Growth', traits: 'Simplified · Game-changing · Connected', color: '#30E047' },
      ].map(p => (
        <div key={p.word} style={{ background: '#fff', padding: '32px 28px' }}>
          <div style={{ fontFamily: "'Inter',sans-serif", fontSize: 11, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', color: p.color, marginBottom: 8 }}>{p.word}</div>
          <div style={{ fontFamily: "'Inter Display','Inter',sans-serif", fontSize: 32, fontWeight: 900, letterSpacing: '-0.03em', color: '#000', marginBottom: 8 }}>{p.word}.</div>
          <div style={{ fontFamily: "'Inter',sans-serif", fontSize: 13, color: '#707070' }}>{p.traits}</div>
        </div>
      ))}
    </div>
  </div>
);

const ContactPage = () => {
  const [form, setForm] = React.useState({ name: '', email: '', service: '', message: '' });
  const [sent, setSent] = React.useState(false);
  const field = (label, key, type='text', placeholder='') => (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
      <label style={{ fontFamily: "'Inter',sans-serif", fontSize: 12, fontWeight: 600, color: '#000' }}>{label}</label>
      {key === 'message'
        ? <textarea rows={4} placeholder={placeholder} value={form[key]} onChange={e => setForm({...form,[key]:e.target.value})}
            style={{ fontFamily:"'Inter',sans-serif", fontSize:14, border:'1px solid #D0D0D0', padding:'10px 14px', resize:'vertical', outline:'none' }}></textarea>
        : key === 'service'
        ? <select value={form[key]} onChange={e => setForm({...form,[key]:e.target.value})}
            style={{ fontFamily:"'Inter',sans-serif", fontSize:14, border:'1px solid #D0D0D0', padding:'10px 14px', outline:'none', background:'#fff' }}>
            <option value="">Select a service</option>
            <option>Brand Identity</option><option>Website Design</option><option>Product Co-Launch</option><option>AI Operations</option><option>Growth Strategy</option>
          </select>
        : <input type={type} placeholder={placeholder} value={form[key]} onChange={e => setForm({...form,[key]:e.target.value})}
            style={{ fontFamily:"'Inter',sans-serif", fontSize:14, border:'1px solid #D0D0D0', padding:'10px 14px', outline:'none' }} />
      }
    </div>
  );

  return (
    <div style={{ background: '#fff', minHeight: '60vh', padding: '80px 64px' }}>
      <div style={{ maxWidth: 1200, margin: '0 auto', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 80 }}>
        <div>
          <div style={{ fontFamily: "'Inter',sans-serif", fontSize: 11, fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase', color: '#A8A8A8', marginBottom: 16 }}>Get In Touch</div>
          <h1 style={{ fontFamily: "'Inter Display','Inter',sans-serif", fontSize: 'clamp(36px,5vw,64px)', fontWeight: 900, lineHeight: 1.0, letterSpacing: '-0.04em', color: '#000', marginBottom: 24 }}>
            Let's build<br />something real.
          </h1>
          <p style={{ fontFamily: "'Inter',sans-serif", fontSize: 16, lineHeight: 1.7, color: '#707070', marginBottom: 40 }}>
            Tell us about your project. We'll give you a straight answer — no fluff, no hard sell.
          </p>
          {[
            { label: 'Clarity Call', desc: 'Book a 30-min strategy session' },
            { label: 'Email Us', desc: 'hello@musketeers.co' },
            { label: 'Based In', desc: 'Philadelphia · New Jersey · Florida' },
          ].map(item => (
            <div key={item.label} style={{ display: 'flex', gap: 16, marginBottom: 20, paddingBottom: 20, borderBottom: '1px solid #F5F5F5' }}>
              <div>
                <div style={{ fontFamily: "'Inter',sans-serif", fontSize: 13, fontWeight: 600, color: '#000' }}>{item.label}</div>
                <div style={{ fontFamily: "'Inter',sans-serif", fontSize: 13, color: '#707070' }}>{item.desc}</div>
              </div>
            </div>
          ))}
        </div>
        {sent ? (
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16, padding: 40, background: '#000' }}>
            <div style={{ fontFamily: "'Inter Display','Inter',sans-serif", fontSize: 48, fontWeight: 900, color: '#30E047' }}>Done.</div>
            <div style={{ fontFamily: "'Inter',sans-serif", fontSize: 16, color: '#707070', textAlign: 'center' }}>We'll be in touch shortly.</div>
          </div>
        ) : (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
            {field('Full Name', 'name', 'text', 'Kristen, Eric, or Petric...')}
            {field('Email', 'email', 'email', 'you@company.com')}
            {field('Service', 'service')}
            {field('Tell us about your project', 'message', 'text', 'What are you building? Where are you stuck?')}
            <button onClick={() => setSent(true)}
              style={{ fontFamily:"'Inter',sans-serif", fontSize:15, fontWeight:600, background:'#000', color:'#fff', border:'none', padding:'14px 32px', cursor:'pointer', alignSelf:'flex-start' }}>
              Send It →
            </button>
          </div>
        )}
      </div>
    </div>
  );
};

// ── App Shell ──────────────────────────────────────────────
const App = () => {
  const [page, setPage] = React.useState(() => localStorage.getItem('msk_page') || 'home');

  const navigate = (p) => {
    setPage(p);
    localStorage.setItem('msk_page', p);
    window.scrollTo({ top: 0 });
  };

  return (
    <div>
      <Header currentPage={page} onNavigate={navigate} />
      {page === 'home' && (
        <>
          <Hero onCTA={() => navigate('contact')} />
          <Services onSelect={() => navigate('contact')} />
        </>
      )}
      {page === 'services' && <Services onSelect={() => navigate('contact')} />}
      {page === 'about'   && <AboutPage />}
      {page === 'contact' && <ContactPage />}
      {page === 'work'    && (
        <div style={{ background: '#fff', minHeight: '60vh', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <div style={{ textAlign: 'center', padding: 64 }}>
            <div style={{ fontFamily: "'Inter Display','Inter',sans-serif", fontSize: 64, fontWeight: 900, letterSpacing: '-0.04em', color: '#000' }}>Work</div>
            <div style={{ fontFamily: "'Inter',sans-serif", fontSize: 16, color: '#A8A8A8', marginTop: 16 }}>Portfolio coming soon.</div>
          </div>
        </div>
      )}
      <Footer onNavigate={navigate} />
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>

<div id="root"></div>
</body>
</html>
