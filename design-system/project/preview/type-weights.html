<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #fff; padding: 20px; font-family: 'Inter', sans-serif; }
.row { display: flex; align-items: center; padding: 9px 0; border-bottom: 1px solid #F5F5F5; gap: 14px; }
.row:last-child { border-bottom: none; }
.wt { font-size: 10px; color: #A8A8A8; width: 72px; flex-shrink: 0; font-family: 'Inter', sans-serif; letter-spacing: 0.04em; text-transform: uppercase; }
</style>
</head><body>
<div class="row"><div class="wt">100 Thin</div><div style="font-family:'Inter',sans-serif;font-weight:100;font-size:22px;color:#000;">Musketeers Design System</div></div>
<div class="row"><div class="wt">300 Light</div><div style="font-family:'Inter',sans-serif;font-weight:300;font-size:22px;color:#000;">Musketeers Design System</div></div>
<div class="row"><div class="wt">400 Regular</div><div style="font-family:'Inter',sans-serif;font-weight:400;font-size:22px;color:#000;">Musketeers Design System</div></div>
<div class="row"><div class="wt">500 Medium</div><div style="font-family:'Inter',sans-serif;font-weight:500;font-size:22px;color:#000;">Musketeers Design System</div></div>
<div class="row"><div class="wt">600 SemiBold</div><div style="font-family:'Inter',sans-serif;font-weight:600;font-size:22px;color:#000;">Musketeers Design System</div></div>
<div class="row"><div class="wt">700 Bold</div><div style="font-family:'Inter',sans-serif;font-weight:700;font-size:22px;color:#000;">Musketeers Design System</div></div>
<div class="row"><div class="wt">800 ExtraBold</div><div style="font-family:'Inter',sans-serif;font-weight:800;font-size:22px;color:#000;">Musketeers Design System</div></div>
<div class="row"><div class="wt">900 Black</div><div style="font-family:'Inter',sans-serif;font-weight:900;font-size:22px;color:#000;">Musketeers Design System</div></div>
</body></html>
