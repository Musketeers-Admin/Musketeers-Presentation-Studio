<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #F5F5F5; padding: 24px; font-family: 'Inter', sans-serif; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.card { background: #fff; border: 1px solid #E8E8E8; }
.card-dark { background: #0C0C0C; border: 1px solid #282828; }
.card-body { padding: 20px; }
.card-tag { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #A8A8A8; margin-bottom: 8px; font-family: 'Inter', sans-serif; }
.card-title { font-family: 'Inter Display', 'Inter', sans-serif; font-weight: 800; font-size: 18px; letter-spacing: -0.02em; line-height: 1.1; color: #000; margin-bottom: 8px; }
.card-title-light { color: #fff; }
.card-text { font-size: 13px; line-height: 1.6; color: #707070; }
.card-text-light { color: #707070; }
.stripe-top { height: 4px; background: var(--gradient-stripe); }
.card-footer { padding: 12px 20px; border-top: 1px solid #E8E8E8; display: flex; justify-content: space-between; align-items: center; }
.card-footer-dark { border-top: 1px solid #282828; }
.card-link { font-size: 12px; font-weight: 600; color: #000; letter-spacing: 0.02em; font-family: 'Inter', sans-serif; }
.card-link-light { color: #fff; }
</style>
</head><body>
<div class="grid">
  <!-- Default card -->
  <div class="card">
    <div class="card-body">
      <div class="card-tag">Strategy</div>
      <div class="card-title">Brand Identity Systems</div>
      <div class="card-text">From logo to language — we build brands that mean something.</div>
    </div>
    <div class="card-footer">
      <span class="card-link">Learn More →</span>
    </div>
  </div>
  <!-- Card with stripe accent -->
  <div class="card">
    <div class="stripe-top"></div>
    <div class="card-body">
      <div class="card-tag">SaaS</div>
      <div class="card-title">Growth-Driven Solutions</div>
      <div class="card-text">Co-launching SaaS products through the Genesys ecosystem.</div>
    </div>
    <div class="card-footer">
      <span class="card-link">Explore →</span>
    </div>
  </div>
  <!-- Dark card -->
  <div class="card card-dark">
    <div class="card-body">
      <div class="card-tag">AI</div>
      <div class="card-title card-title-light">AI-Powered Operations</div>
      <div class="card-text card-text-light">SOPs, CRM, and productivity — simplified by intelligence.</div>
    </div>
    <div class="card-footer card-footer-dark">
      <span class="card-link card-link-light">Discover →</span>
    </div>
  </div>
</div>
</body></html>
