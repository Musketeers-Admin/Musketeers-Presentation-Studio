<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #fff; padding: 24px; font-family: 'Inter', sans-serif; }
.label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #A8A8A8; margin-bottom: 10px; font-family: 'Inter', sans-serif; }
.row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
.badge { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 4px 12px; display: inline-block; border-radius: 9999px; }
.tag { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; padding: 5px 14px; display: inline-block; border: 1px solid #D0D0D0; border-radius: 9999px; }
.pill { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; padding: 5px 14px; display: inline-block; border-radius: 9999px; }
</style>
</head><body>
<div class="label">Badges — Solid</div>
<div class="row">
  <span class="badge" style="background:#000; color:#fff;">Brand</span>
  <span class="badge" style="background:#FC2E12; color:#fff;">Hot</span>
  <span class="badge" style="background:#0D41FF; color:#fff;">New</span>
  <span class="badge" style="background:#30E047; color:#000;">Live</span>
  <span class="badge" style="background:#FFD81D; color:#000;">Beta</span>
</div>
<div class="label">Tags — Outlined</div>
<div class="row">
  <span class="tag">Strategy</span>
  <span class="tag">Branding</span>
  <span class="tag">SaaS</span>
  <span class="tag">AI</span>
  <span class="tag">Growth</span>
</div>
<div class="label">Pills — Rounded</div>
<div class="row">
  <span class="pill" style="background:#F5F5F5; color:#000;">Persistent</span>
  <span class="pill" style="background:#F5F5F5; color:#000;">Vital</span>
  <span class="pill" style="background:#000; color:#fff;">Growth</span>
</div>
<div class="label">Status Indicators</div>
<div class="row">
  <span style="display:flex; align-items:center; gap:6px; font-family:'Inter',sans-serif; font-size:13px; font-weight:500;">
    <span style="width:8px;height:8px;border-radius:50%;background:#30E047;display:inline-block;"></span>Active
  </span>
  <span style="display:flex; align-items:center; gap:6px; font-family:'Inter',sans-serif; font-size:13px; font-weight:500;">
    <span style="width:8px;height:8px;border-radius:50%;background:#FFD81D;display:inline-block;"></span>Pending
  </span>
  <span style="display:flex; align-items:center; gap:6px; font-family:'Inter',sans-serif; font-size:13px; font-weight:500;">
    <span style="width:8px;height:8px;border-radius:50%;background:#FC2E12;display:inline-block;"></span>Error
  </span>
  <span style="display:flex; align-items:center; gap:6px; font-family:'Inter',sans-serif; font-size:13px; font-weight:500;">
    <span style="width:8px;height:8px;border-radius:50%;background:#D0D0D0;display:inline-block;"></span>Offline
  </span>
</div>
</body></html>
