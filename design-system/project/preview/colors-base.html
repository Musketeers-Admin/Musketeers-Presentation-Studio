<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #fff; padding: 20px; font-family: 'Inter', sans-serif; }
.row { display: flex; gap: 0; height: 72px; }
.swatch { flex: 1; display: flex; align-items: flex-end; padding: 8px; }
.swatch span { font-size: 10px; font-weight: 600; font-family: 'Inter', sans-serif; letter-spacing: 0.04em; }
.label-row { display: flex; gap: 0; margin-bottom: 4px; }
.label-row span { flex: 1; font-size: 10px; color: #707070; text-align: center; font-family: 'Inter', sans-serif; }
.section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #A8A8A8; margin: 16px 0 6px; font-family: 'Inter', sans-serif; }
</style>
</head><body>
<div class="section-label">Base</div>
<div class="row">
  <div class="swatch" style="background:#000; flex:2;"><span style="color:#fff">Black #000000</span></div>
  <div class="swatch" style="background:#fff; flex:2; border: 1px solid #E8E8E8;"><span style="color:#000">White #FFFFFF</span></div>
</div>

<div class="section-label">Neutral Scale</div>
<div class="row">
  <div class="swatch" style="background:#F5F5F5;"><span style="color:#707070">100</span></div>
  <div class="swatch" style="background:#E8E8E8;"><span style="color:#707070">200</span></div>
  <div class="swatch" style="background:#D0D0D0;"><span style="color:#707070">300</span></div>
  <div class="swatch" style="background:#A8A8A8;"><span style="color:#fff">400</span></div>
  <div class="swatch" style="background:#707070;"><span style="color:#fff">500</span></div>
  <div class="swatch" style="background:#484848;"><span style="color:#fff">600</span></div>
  <div class="swatch" style="background:#282828;"><span style="color:#fff">700</span></div>
  <div class="swatch" style="background:#181818;"><span style="color:#fff">800</span></div>
  <div class="swatch" style="background:#0C0C0C;"><span style="color:#fff">900</span></div>
</div>
</body></html>
