<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #fff; padding: 24px; font-family: 'Inter', sans-serif; }
.row { display: flex; align-items: baseline; gap: 16px; padding: 10px 0; border-bottom: 1px solid #F5F5F5; }
.row:last-child { border-bottom: none; }
.tag { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #A8A8A8; width: 60px; flex-shrink: 0; font-family: 'Inter', sans-serif; }
</style>
</head><body>
<div class="row">
  <div class="tag">XL</div>
  <div style="font-family:'Inter',sans-serif; font-weight:400; font-size:24px; line-height:1.4; color:#000;">Musketeers — versatile solutions.</div>
</div>
<div class="row">
  <div class="tag">LG</div>
  <div style="font-family:'Inter',sans-serif; font-weight:400; font-size:20px; line-height:1.5; color:#000;">We help entrepreneurs grow beyond limits.</div>
</div>
<div class="row">
  <div class="tag">MD</div>
  <div style="font-family:'Inter',sans-serif; font-weight:400; font-size:16px; line-height:1.6; color:#000;">Brand, design, strategy, and beyond — every angle of what a modern business needs.</div>
</div>
<div class="row">
  <div class="tag">SM</div>
  <div style="font-family:'Inter',sans-serif; font-weight:400; font-size:14px; line-height:1.6; color:#707070;">Caption text, secondary descriptions, and supporting metadata appear at this size.</div>
</div>
<div class="row">
  <div class="tag">XS</div>
  <div style="font-family:'Inter',sans-serif; font-weight:500; font-size:12px; line-height:1.5; letter-spacing:0.04em; text-transform:uppercase; color:#A8A8A8;">LABEL · TAG · TIMESTAMP</div>
</div>
</body></html>
