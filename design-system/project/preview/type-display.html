<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #fff; padding: 24px; font-family: 'Inter Display', 'Inter', sans-serif; }
.specimen { margin-bottom: 20px; border-bottom: 1px solid #E8E8E8; padding-bottom: 20px; }
.specimen:last-child { border-bottom: none; }
.meta { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #A8A8A8; font-family: 'Inter', sans-serif; margin-bottom: 6px; }
</style>
</head><body>
<div class="specimen">
  <div class="meta">Display XL · Inter Display Black · −0.04em</div>
  <div style="font-family:'Inter Display',sans-serif; font-weight:900; font-size:56px; line-height:1.0; letter-spacing:-0.04em; color:#000;">Bold by nature.</div>
</div>
<div class="specimen">
  <div class="meta">Display LG · Inter Display ExtraBold</div>
  <div style="font-family:'Inter Display',sans-serif; font-weight:800; font-size:40px; line-height:1.05; letter-spacing:-0.03em; color:#000;">Built for impact.</div>
</div>
<div class="specimen">
  <div class="meta">Display MD · Inter Display Bold</div>
  <div style="font-family:'Inter Display',sans-serif; font-weight:700; font-size:28px; line-height:1.1; letter-spacing:-0.02em; color:#000;">Persistent. Vital. Growth.</div>
</div>
</body></html>
